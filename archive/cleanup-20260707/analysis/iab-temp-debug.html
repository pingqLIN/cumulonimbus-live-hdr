<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex IAB Temporary Debug</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #314d77;
        --panel: rgb(255 255 255 / 0.08);
        --panel-strong: rgb(255 255 255 / 0.14);
        --line: rgb(222 222 184 / 0.35);
        --text: #e4e1b7;
        --muted: #b8bb9b;
        --ok: #a8e3b5;
        --warn: #ffcf91;
        --bad: #ffaaa2;
        font-family:
          ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(rgb(255 255 255 / 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 0.04) 1px, transparent 1px),
          var(--bg);
        background-size: 28px 28px;
      }

      main {
        width: min(980px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 24px 0;
        display: grid;
        gap: 14px;
      }

      header,
      section {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.14);
      }

      header {
        padding: 16px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(18px, 4vw, 24px);
        line-height: 1.1;
      }

      h2 {
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      p {
        color: var(--muted);
        line-height: 1.45;
      }

      section {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      button {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--line);
        color: var(--text);
        background: var(--panel-strong);
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        border-color: rgb(222 222 184 / 0.62);
        background: rgb(255 255 255 / 0.18);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 78px;
        padding: 10px;
        border: 1px solid rgb(222 222 184 / 0.22);
        background: rgb(0 0 0 / 0.08);
        display: grid;
        gap: 5px;
      }

      .metric strong {
        color: var(--text);
        font-size: 12px;
      }

      .metric code,
      pre {
        color: var(--muted);
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }

      .status-ok {
        color: var(--ok);
      }

      .status-warn {
        color: var(--warn);
      }

      .status-bad {
        color: var(--bad);
      }

      canvas {
        width: 100%;
        height: 180px;
        border: 1px solid rgb(222 222 184 / 0.22);
        background: rgb(0 0 0 / 0.18);
      }

      pre {
        max-height: 320px;
        margin: 0;
        padding: 12px;
        overflow: auto;
        border: 1px solid rgb(222 222 184 / 0.22);
        background: rgb(0 0 0 / 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Codex IAB Temporary Debug</h1>
        <p>
          Self-contained local diagnostic page for checking the in-app browser surface without
          depending on the project preview server.
        </p>
      </header>

      <section>
        <h2>Controls</h2>
        <div class="toolbar">
          <button id="refresh" type="button">Refresh diagnostics</button>
          <button id="copy" type="button">Copy report</button>
          <button id="target" type="button">Open local preview</button>
        </div>
        <p id="copy-status" aria-live="polite">Ready.</p>
      </section>

      <section>
        <h2>Runtime</h2>
        <div class="grid">
          <div class="metric"><strong>Time</strong><code id="time">-</code></div>
          <div class="metric"><strong>Viewport</strong><code id="viewport">-</code></div>
          <div class="metric"><strong>Device pixel ratio</strong><code id="dpr">-</code></div>
          <div class="metric"><strong>Online</strong><code id="online">-</code></div>
          <div class="metric"><strong>Storage</strong><code id="storage">-</code></div>
          <div class="metric"><strong>WebGL</strong><code id="webgl">-</code></div>
          <div class="metric"><strong>Language</strong><code id="language">-</code></div>
          <div class="metric"><strong>User agent</strong><code id="ua">-</code></div>
        </div>
      </section>

      <section>
        <h2>Canvas Probe</h2>
        <canvas id="probe" width="960" height="360" aria-label="Canvas diagnostic probe"></canvas>
      </section>

      <section>
        <h2>Report</h2>
        <pre id="report">{}</pre>
      </section>
    </main>

    <script>
      const elements = {
        copyStatus: document.querySelector("#copy-status"),
        dpr: document.querySelector("#dpr"),
        language: document.querySelector("#language"),
        online: document.querySelector("#online"),
        report: document.querySelector("#report"),
        storage: document.querySelector("#storage"),
        time: document.querySelector("#time"),
        ua: document.querySelector("#ua"),
        viewport: document.querySelector("#viewport"),
        webgl: document.querySelector("#webgl")
      };

      function testStorage() {
        try {
          const key = "codex-iab-debug";
          localStorage.setItem(key, new Date().toISOString());
          const value = localStorage.getItem(key);
          localStorage.removeItem(key);
          return value ? "ok" : "unavailable";
        } catch (error) {
          return error instanceof Error ? error.message : String(error);
        }
      }

      function testWebGl() {
        const canvas = document.createElement("canvas");
        const context =
          canvas.getContext("webgl2") ||
          canvas.getContext("webgl") ||
          canvas.getContext("experimental-webgl");
        if (!context) {
          return { ok: false, renderer: "unavailable" };
        }
        const debugInfo = context.getExtension("WEBGL_debug_renderer_info");
        return {
          ok: true,
          renderer: debugInfo
            ? context.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
            : context.getParameter(context.RENDERER),
          version: context.getParameter(context.VERSION)
        };
      }

      function drawProbe(report) {
        const canvas = document.querySelector("#probe");
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return;
        }
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "#4f7ebf");
        gradient.addColorStop(0.55, "#a9c4e8");
        gradient.addColorStop(1, "#f2eab0");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.28)";
        for (let x = 0; x < canvas.width; x += 32) {
          ctx.fillRect(x, 0, 1, canvas.height);
        }
        for (let y = 0; y < canvas.height; y += 32) {
          ctx.fillRect(0, y, canvas.width, 1);
        }
        ctx.fillStyle = "#253858";
        ctx.font = "26px ui-monospace, monospace";
        ctx.fillText("Canvas OK", 32, 64);
        ctx.font = "18px ui-monospace, monospace";
        ctx.fillText(`${report.viewport.width} x ${report.viewport.height}`, 32, 96);
      }

      function refreshDiagnostics() {
        const webgl = testWebGl();
        const report = {
          href: location.href,
          readyState: document.readyState,
          time: new Date().toISOString(),
          viewport: {
            width: innerWidth,
            height: innerHeight,
            dpr: devicePixelRatio
          },
          online: navigator.onLine,
          language: navigator.language,
          languages: navigator.languages,
          storage: testStorage(),
          webgl,
          userAgent: navigator.userAgent
        };

        elements.time.textContent = new Date().toLocaleString();
        elements.viewport.textContent = `${report.viewport.width} x ${report.viewport.height}`;
        elements.dpr.textContent = String(report.viewport.dpr);
        elements.online.textContent = report.online ? "online" : "offline";
        elements.storage.textContent = report.storage;
        elements.webgl.textContent = webgl.ok
          ? `${webgl.version || "WebGL"} | ${webgl.renderer}`
          : "unavailable";
        elements.webgl.className = webgl.ok ? "status-ok" : "status-bad";
        elements.language.textContent = `${report.language} | ${report.languages.join(", ")}`;
        elements.ua.textContent = report.userAgent;
        elements.report.textContent = JSON.stringify(report, null, 2);
        drawProbe(report);
      }

      document.querySelector("#refresh").addEventListener("click", refreshDiagnostics);
      document.querySelector("#copy").addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(elements.report.textContent);
          elements.copyStatus.textContent = "Report copied.";
          elements.copyStatus.className = "status-ok";
        } catch (error) {
          elements.copyStatus.textContent =
            "Copy failed: " + (error instanceof Error ? error.message : String(error));
          elements.copyStatus.className = "status-warn";
        }
      });
      document.querySelector("#target").addEventListener("click", () => {
        location.href = "http://127.0.0.1:4178/";
      });
      addEventListener("resize", refreshDiagnostics);
      refreshDiagnostics();
    </script>
  </body>
</html>
