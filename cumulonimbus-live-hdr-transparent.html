<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cumulonimbus Live HDR Transparent Output</title>
  <meta name="description" content="Transparent-background output entry for the Cumulonimbus Live HDR mainline renderer." />
</head>
<body>
  <script>
    const target = new URL("cumulonimbus-live-hdr-mainline.html", window.location.href);
    const incoming = new URLSearchParams(window.location.search);
    const defaults = new URLSearchParams({
      background: "0",
      sky: "transparent",
      controls: "0",
      hud: "0",
      grid: "0",
      autoQuality: "0",
      quality: "0.72",
      timeSpeed: "0"
    });

    for (const [key, value] of defaults) {
      target.searchParams.set(key, incoming.get(key) ?? value);
    }
    for (const [key, value] of incoming) {
      target.searchParams.set(key, value);
    }
    target.hash = window.location.hash;
    window.location.replace(target);
  </script>
  <noscript>
    <a href="cumulonimbus-live-hdr-mainline.html?background=0&amp;sky=transparent&amp;controls=0&amp;hud=0&amp;grid=0">
      Open transparent Cumulonimbus Live HDR output
    </a>
  </noscript>
</body>
</html>
