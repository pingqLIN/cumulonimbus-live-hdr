<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Cumulonimbus Live HDR</title>
  </head>
  <body>
    <main class="shell">
      <section class="viewport" aria-label="Cumulonimbus cloud preview">
        <canvas id="cloud-canvas"></canvas>
      </section>
      <aside class="controls" aria-label="Render controls">
        <div>
          <p class="eyebrow">Algorithmic cloud field</p>
          <h1>Cumulonimbus Live HDR</h1>
          <p id="renderer-status" class="renderer-status">Renderer: starting</p>
        </div>
        <div class="control-group">
          <p class="control-label">View</p>
          <div class="segmented-control" role="group" aria-label="Preview mode">
            <button type="button" data-view-mode="field">Field</button>
            <button type="button" data-view-mode="3d">3D</button>
          </div>
        </div>
        <div class="control-group look-controls">
          <p class="control-label">Look</p>
          <div
            class="segmented-control segmented-control--stacked"
            role="group"
            aria-label="3D look preset"
          >
            <button type="button" data-look-preset="structural">Structural</button>
            <button type="button" data-look-preset="demo-like">Demo-like</button>
            <button type="button" data-look-preset="soft-volumetric-ish">Soft volume</button>
          </div>
        </div>
        <section
          id="metrics-panel"
          class="metrics-panel"
          aria-label="Preview metrics"
          aria-live="polite"
        >
          <p class="control-label">Metrics</p>
          <div class="metric-grid" data-metric-grid></div>
        </section>
        <label>
          Seed
          <input id="seed" type="number" value="20260510" />
        </label>
        <label>
          Storm age
          <input id="stormAge" type="range" min="0" max="1" step="0.01" value="0.48" />
        </label>
        <label>
          Humidity
          <input id="humidity" type="range" min="0" max="1" step="0.01" value="0.66" />
        </label>
        <label>
          Uplift strength
          <input id="upliftStrength" type="range" min="0" max="1" step="0.01" value="0.72" />
        </label>
        <label>
          Wind shear
          <input id="windShear" type="range" min="0" max="1" step="0.01" value="0.18" />
        </label>
        <label>
          Anvil outflow
          <input id="anvilOutflow" type="range" min="0" max="1" step="0.01" value="0.64" />
        </label>
        <label>
          Anvil persistence
          <input id="anvilPersistence" type="range" min="0" max="1" step="0.01" value="0.68" />
        </label>
        <label>
          Sun edge peak nits
          <input id="sunEdgePeakNits" type="range" min="250" max="2000" step="10" value="1000" />
        </label>
        <label>
          Atmospheric haze
          <input id="haze" type="range" min="0" max="1" step="0.01" value="0.42" />
        </label>
        <div class="actions">
          <button id="pause" type="button">Pause</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
